name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run icons
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: discord-purge-dev-build
          path: |
            dist/chrome/
            dist/firefox/
            dist/discord-purge.user.js
          retention-days: 7
