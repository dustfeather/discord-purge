name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write

concurrency:
    group: release
    cancel-in-progress: true

jobs:
    release:
        uses: dustfeather/shared-workflows/.github/workflows/release-extension.yml@v4
        with:
            runner: arc-df-discord-purge
            targets: '["chrome","firefox","userscript"]'
            addon-id: discord-purge@dustfeather
        secrets: inherit
