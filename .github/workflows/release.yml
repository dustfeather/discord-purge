name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    permissions:
      contents: read
    uses: dustfeather/shared-workflows/.github/workflows/node-test.yml@v2
    with:
      runner: arc-df-discord-purge
      run-typecheck: false

  build:
    needs: tests
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci

      - name: Determine next version from tags
        id: version
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            next="1.0.0"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            next="$major.$minor.$((patch + 1))"
          fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Next version: $next (previous: ${latest:-none})"

      - name: Build with version
        run: npm run icons && npm run pack
        env:
          DISCORD_PURGE_VERSION: ${{ steps.version.outputs.version }}

      - name: Tag release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" > dist/release-notes.txt
          else
            echo "- Initial release" > dist/release-notes.txt
          fi

      - name: Package source code for AMO review
        run: git archive --format=zip --prefix=discord-purge-source/ -o dist/discord-purge-source.zip HEAD

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/chrome.zip
            dist/firefox.xpi
            dist/discord-purge.user.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: extensions
          path: |
            dist/chrome.zip
            dist/firefox.xpi
            dist/discord-purge.user.js
            dist/discord-purge-source.zip
            dist/release-notes.txt

  publish-chrome:
    needs: build
    uses: dustfeather/shared-workflows/.github/workflows/publish-chrome.yml@v2
    with:
      runner: arc-df-discord-purge
      zip-name: chrome.zip
    secrets: inherit

  publish-firefox:
    needs: build
    uses: dustfeather/shared-workflows/.github/workflows/publish-firefox.yml@v2
    with:
      runner: arc-df-discord-purge
      xpi-name: firefox.xpi
      source-name: discord-purge-source.zip
      addon-id: discord-purge@dustfeather
    secrets: inherit
